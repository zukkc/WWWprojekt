<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prognoza godzinowa</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/hourly.css">
</head>

<body>
  <header>
    <nav>
      <ul>
        <li class="btn"><a href="index.html">Glowna</a></li>
        <li class="btn"><a href="hourly.html">Godzinowa</a></li>
        <li class="btn"><a href="weekly.html">7 dni</a></li>
        <li class="btn"><a href="history.html">Historia</a></li>
        <li class="btn"><a href="air.html">Powietrze</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="card">
      <section class="card-content">
        <h1>Prognoza godzinowa</h1>

        <form id="city-form" class="search-panel">
          <label for="city-input" class="p-normal">Wpisz miasto</label>
          <div class="search-row">
            <input id="city-input" type="text" name="city" placeholder="Np. Krakow" autocomplete="off">
            <button type="submit" class="btn">Sprawdz</button>
          </div>
          <div id="search-history-list" class="search-history-list" aria-label="Historia wyszukiwan" hidden></div>
          <p id="form-error" class="form-error" aria-live="polite"></p>
        </form>

        <div class="summary-panel">
          <p id="location-name" class="p-big">Brak danych</p>
          <p id="chart-caption" class="p-small">Dane dla najblizszych 24 godzin.</p>
        </div>

        <p id="status-message" class="status-message" aria-live="polite"></p>
      </section>

      <div class="v-separator"></div>

      <section class="card-content">
        <div class="details-heading">
          <h2>Wykres</h2>
          <p class="p-small">Mozesz przelaczac typ danych.</p>
        </div>

        <div class="button-row">
          <button type="button" id="show-temp" class="btn active">Temperatura</button>
          <button type="button" id="show-rain" class="btn">Opady</button>
          <button type="button" id="show-wind" class="btn">Wiatr</button>
        </div>

        <div class="chart-box">
          <svg id="hourly-chart" aria-label="Wykres prognozy godzinowej"></svg>
        </div>
      </section>
    </section>
  </main>

  <footer>
    <p>&copy; Projekt na studia</p>
  </footer>

  <script src="js/weather_chart.js"></script>
  <script src="js/search_history.js"></script>
  <script src="js/hourly.js"></script>
</body>

</html>
