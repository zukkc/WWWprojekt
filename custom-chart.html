<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wlasny wykres SVG</title>
  <link rel="stylesheet" href="css/custom-chart.css">
</head>

<body>
  <header>
    <h1>Wlasny wykres pogodowy</h1>
    <p>Przyklad bez biblioteki do wykresow.</p>
  </header>

  <main>
    <section class="panel">
      <form id="city-form">
        <label for="city-input">Miasto</label>
        <input id="city-input" type="text" name="city" placeholder="Np. Warszawa">
        <button type="submit">Sprawdz</button>
      </form>

      <p id="form-error" class="error-text"></p>
      <p id="status-message"></p>
      <h2 id="location-name">Brak danych</h2>

      <div class="button-row">
        <button type="button" id="show-temperature" class="active">Temperatura</button>
        <button type="button" id="show-rain">Opady</button>
      </div>

      <div class="chart-wrapper">
        <svg id="weather-chart" viewBox="0 0 760 360" aria-label="Wykres pogodowy"></svg>
      </div>

      <div id="chart-legend" class="legend"></div>
    </section>
  </main>

  <script src="js/weather_chart.js"></script>
  <script src="js/custom_chart.js"></script>
</body>

</html>
